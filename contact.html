<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact &amp; Tour Booking | S&amp;S Learning Lab</title>
  <meta name="description" content="Contact S&amp;S Learning Lab, schedule a tour, and learn about hours and location in Chester, Virginia.">
  <link rel="manifest" href="site.webmanifest">
  <link rel="icon" type="image/png" href="images/ss-learning-lab-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="contact">
  <div id="site-header"></div>
  <main>
    <section class="page-hero">
      <div class="container">
        <span class="eyebrow">Contact Us</span>
        <h1>Get in touch with<br>S&amp;S Learning Lab</h1>
        <p class="lead">Use the contact form below for questions, updates, and next steps. We would be happy to hear from you.</p>
      </div>
    </section>

    <section class="section">
      <div class="container split-layout contact-split-layout">
        <div class="info-card contact-card">
          <div class="contact-meta-list">
            <div class="contact-meta-item">
              <img class="contact-meta-icon" src="images/contact-location-icon.svg" alt="">
              <div>
                <h3>Address</h3>
                <p>Chester, VA 23831</p>
              </div>
            </div>
            <div class="contact-meta-item">
              <img class="contact-meta-icon" src="images/contact-email-icon.svg" alt="">
              <div>
                <h3>Email</h3>
                <p><a class="text-link" href="mailto:info@sslearninglab.com">info@sslearninglab.com</a></p>
              </div>
            </div>
          </div>
          <div class="contact-card-map">
            <iframe
              title="Map showing Chester, VA 23831"
              src="https://www.google.com/maps?q=Chester,%20VA%2023831&z=13&output=embed"
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"
              allowfullscreen>
            </iframe>
          </div>
        </div>
        <form class="site-form" id="contact-form" data-form-type="contact">
          <h2>Send a message</h2>
          <label>
            Name
            <input type="text" name="name" required>
          </label>
          <label>
            Email
            <input type="email" name="email" required>
          </label>
          <label>
            Phone
            <input type="tel" name="phone">
          </label>
          <label>
            Message
            <textarea name="message" rows="5" required></textarea>
          </label>
          <button type="submit" class="button button-primary">Send Message</button>
          <p class="form-message" aria-live="polite"></p>
        </form>
      </div>
    </section>

  </main>
  <div id="site-footer"></div>
  <script src="script.js"></script>
</body>
</html>
